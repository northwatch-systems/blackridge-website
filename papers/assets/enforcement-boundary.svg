<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 350" width="760" style="max-width:100%;height:auto" role="img" aria-label="Agent intent passes through an enforcement boundary that checks actor, authority, policy, target, and timing; the outcome is allow to protected systems, escalate to human review, or deny — and every decision writes an append-only record.">
  <style>
    text{font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    .t1{fill:#0b0b0b;font-size:13.5px;font-weight:600}
    .t2{fill:#52514e;font-size:11px}
    .t3{fill:#898781;font-size:10.5px}
    .cap{fill:#898781;font-size:10px;font-weight:600;letter-spacing:.09em}
    .box{fill:#fcfcfb;stroke:#c3c2b7;stroke-width:1.25}
    .soft{fill:rgba(42,120,214,.08);stroke:#2a78d6;stroke-width:1.5}
    .edge{stroke:#898781;stroke-width:1.5;fill:none}
    .mk{fill:#898781}
    .allow{stroke:#0ca30c;stroke-width:2;fill:none}
    .allow-t{fill:#006300;font-size:11px;font-weight:600}
    .mk-a{fill:#0ca30c}
    .esc{stroke:#c98500;stroke-width:2;fill:none}
    .esc-t{fill:#8a5a00;font-size:11px;font-weight:600}
    .mk-e{fill:#c98500}
    .deny{stroke:#d03b3b;stroke-width:2;fill:none}
    .deny-t{fill:#d03b3b;font-size:11px;font-weight:600}
    .deny-bar{fill:#d03b3b}
    @media (prefers-color-scheme:dark){
      .t1{fill:#ffffff}.t2{fill:#c3c2b7}
      .box{fill:#1a1a19;stroke:#383835}
      .soft{fill:rgba(57,135,229,.14);stroke:#3987e5}
      .allow-t{fill:#0ca30c}
      .esc{stroke:#fab219}.esc-t{fill:#fab219}.mk-e{fill:#fab219}
      .deny-t{fill:#e66767}
    }
  
      .t1{fill:#ffffff}.t2{fill:#c3c2b7}
      .box{fill:#1a1a19;stroke:#383835}
      .soft{fill:rgba(57,135,229,.14);stroke:#3987e5}
      .allow-t{fill:#0ca30c}
      .esc{stroke:#fab219}.esc-t{fill:#fab219}.mk-e{fill:#fab219}
      .deny-t{fill:#e66767}
  </style>
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" class="mk"/></marker>
    <marker id="arrA" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" class="mk-a"/></marker>
    <marker id="arrE" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" class="mk-e"/></marker>
  </defs>

  <rect x="40" y="88" width="180" height="76" rx="10" class="box"/>
  <text x="130" y="114" text-anchor="middle" class="t1">agent intent</text>
  <text x="130" y="133" text-anchor="middle" class="t2">a proposed tool call</text>
  <text x="130" y="150" text-anchor="middle" class="t3">untrusted until admitted</text>

  <line x1="220" y1="126" x2="326" y2="126" class="edge" marker-end="url(#arr)"/>

  <text x="385" y="26" text-anchor="middle" class="cap">ENFORCEMENT BOUNDARY</text>
  <rect x="330" y="36" width="110" height="230" rx="12" class="soft"/>
  <text x="385" y="78"  text-anchor="middle" class="t3">this actor?</text>
  <text x="385" y="112" text-anchor="middle" class="t3">this authority?</text>
  <text x="385" y="146" text-anchor="middle" class="t3">this policy?</text>
  <text x="385" y="180" text-anchor="middle" class="t3">this target?</text>
  <text x="385" y="214" text-anchor="middle" class="t3">right now?</text>

  <path d="M440 126 L554 126" class="allow" marker-end="url(#arrA)"/>
  <text x="497" y="116" text-anchor="middle" class="allow-t">allow</text>
  <rect x="560" y="88" width="160" height="76" rx="10" class="box"/>
  <text x="640" y="118" text-anchor="middle" class="t1">protected systems</text>
  <text x="640" y="138" text-anchor="middle" class="t2">repos · deploys · records</text>

  <path d="M440 72 C 490 72, 505 42, 554 42" class="esc" marker-end="url(#arrE)"/>
  <text x="490" y="44" text-anchor="middle" class="esc-t">escalate</text>
  <rect x="560" y="20" width="160" height="44" rx="10" class="box"/>
  <text x="640" y="47" text-anchor="middle" class="t1">human review</text>

  <path d="M440 196 L516 196" class="deny"/>
  <rect x="516" y="186" width="3" height="20" class="deny-bar"/>
  <text x="478" y="186" text-anchor="middle" class="deny-t">deny</text>

  <line x1="385" y1="266" x2="385" y2="292" class="edge" marker-end="url(#arr)"/>
  <rect x="150" y="296" width="470" height="44" rx="10" class="box"/>
  <text x="385" y="315" text-anchor="middle" class="t1">decision record</text>
  <text x="385" y="331" text-anchor="middle" class="t3">every allow, deny, and escalation — append-only, checkable later</text>
</svg>
